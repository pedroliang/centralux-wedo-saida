name: Atualizar dados da planilha

on:
  schedule:
    - cron: '0 9 * * *'   # todos os dias ~06:00 horário de Brasília (09:00 UTC)
  workflow_dispatch: {}     # permite rodar manualmente pelo botão Actions

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Gerar data.json a partir da planilha
        run: python parse_sheet.py
      - name: Commit se houver mudanças
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if ! git diff --quiet data.json; then
            git add data.json
            git commit -m "chore: atualiza data.json ($(date -u +%Y-%m-%d))"
            git push
          else
            echo "Sem mudanças nos dados."
          fi
