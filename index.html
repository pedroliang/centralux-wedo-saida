<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Centralux • Saída Diária</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
<style>
  :root{
    --bg:#0f172a; --panel:#1e293b; --panel2:#273449; --line:#334155;
    --txt:#e2e8f0; --muted:#94a3b8; --accent:#38bdf8; --accent2:#22d3ee;
    --good:#34d399; --bad:#f87171; --chip:#0ea5e9;
  }
  *{box-sizing:border-box}
  body{margin:0;font-family:'Segoe UI',system-ui,Arial,sans-serif;background:var(--bg);color:var(--txt);}
  header{padding:20px 24px;background:linear-gradient(135deg,#0c4a6e,#0f172a);border-bottom:1px solid var(--line);}
  header h1{margin:0;font-size:22px;letter-spacing:.3px;}
  header .sub{color:var(--muted);font-size:13px;margin-top:4px;}
  .wrap{max-width:1200px;margin:0 auto;padding:20px 24px 60px;}
  .controls{display:flex;flex-wrap:wrap;gap:12px;align-items:flex-end;margin-bottom:20px;}
  .field{display:flex;flex-direction:column;gap:6px;}
  .field label{font-size:12px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;}
  input,select{background:var(--panel);border:1px solid var(--line);color:var(--txt);
    padding:10px 12px;border-radius:8px;font-size:14px;outline:none;}
  input:focus,select:focus{border-color:var(--accent);}
  #search{min-width:320px;}
  button{background:var(--accent);color:#06283d;border:none;padding:10px 16px;border-radius:8px;
    font-weight:600;cursor:pointer;font-size:14px;}
  button.ghost{background:transparent;color:var(--accent);border:1px solid var(--line);}
  .cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(170px,1fr));gap:12px;margin-bottom:24px;}
  .card{background:var(--panel);border:1px solid var(--line);border-radius:10px;padding:14px 16px;}
  .card .k{color:var(--muted);font-size:12px;text-transform:uppercase;letter-spacing:.5px;}
  .card .v{font-size:24px;font-weight:700;margin-top:4px;}
  .charts{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:24px;}
  .chart-box{background:var(--panel);border:1px solid var(--line);border-radius:10px;padding:14px;}
  .chart-box h3{margin:0 0 10px;font-size:14px;}
  .chart-box h3 .good{color:var(--good)} .chart-box h3 .bad{color:var(--bad)}
  .chart-canvas{position:relative;height:340px;}
  table{width:100%;border-collapse:collapse;background:var(--panel);border-radius:10px;overflow:hidden;}
  th,td{padding:10px 12px;text-align:left;font-size:13px;border-bottom:1px solid var(--line);}
  th{background:var(--panel2);color:var(--muted);text-transform:uppercase;letter-spacing:.4px;font-size:11px;
    cursor:pointer;user-select:none;white-space:nowrap;}
  th.num,td.num{text-align:right;}
  tr:hover td{background:#22304a;}
  .sku{color:var(--accent2);font-variant-numeric:tabular-nums;}
  .soma{font-weight:700;font-variant-numeric:tabular-nums;}
  .chip{display:inline-block;background:#0c3b52;color:#bae6fd;border:1px solid #155e75;
    padding:2px 8px;border-radius:999px;font-size:11px;margin:2px 4px 2px 0;white-space:nowrap;}
  .meta{color:var(--muted);font-size:12px;margin:14px 0 6px;}
  .count{color:var(--muted);font-size:13px;margin:6px 0 10px;}
  a{color:var(--accent);}
  @media(max-width:760px){.charts{grid-template-columns:1fr}#search{min-width:200px}}
</style>
</head>
<body>
<header>
  <h1>Centralux • Saída Diária</h1>
  <div class="sub">Consulta de produtos e quantidades (Soma do SKU) por data — colunas G e H da planilha.</div>
</header>

<div class="wrap">
  <div class="controls">
    <div class="field">
      <label for="search">Pesquisar produto ou SKU</label>
      <input id="search" type="text" placeholder="ex.: bulbo, painel, 2449...">
    </div>
    <div class="field">
      <label for="dateSel">Data</label>
      <select id="dateSel"><option value="__all__">Todas as datas (somadas)</option></select>
    </div>
    <div class="field">
      <label for="logSel">Logística</label>
      <select id="logSel"><option value="__all__">Todas</option></select>
    </div>
    <button id="clearBtn" class="ghost">Limpar</button>
    <button id="reloadBtn" class="ghost">↻ Atualizar da planilha</button>
  </div>

  <div class="cards">
    <div class="card"><div class="k">Produtos (SKUs)</div><div class="v" id="cProds">–</div></div>
    <div class="card"><div class="k">Quantidade total</div><div class="v" id="cQty">–</div></div>
    <div class="card"><div class="k">Datas no filtro</div><div class="v" id="cDates">–</div></div>
    <div class="card"><div class="k">Maior saída</div><div class="v" id="cTop">–</div></div>
  </div>

  <div class="charts">
    <div class="chart-box">
      <h3>Top 10 <span class="good">melhores</span> por quantidade</h3>
      <div class="chart-canvas"><canvas id="chartTop"></canvas></div>
    </div>
    <div class="chart-box">
      <h3>Top 10 <span class="bad">piores</span> por quantidade</h3>
      <div class="chart-canvas"><canvas id="chartBottom"></canvas></div>
    </div>
  </div>

  <div class="meta" id="srcMeta"></div>
  <div class="count" id="count"></div>
  <table id="tbl">
    <thead><tr>
      <th data-sort="sku">SKU</th>
      <th data-sort="desc">Descrição</th>
      <th data-sort="logistics">Logística solicitada</th>
      <th data-sort="dateInfo">Data(s)</th>
      <th class="num" data-sort="soma">Soma (qtd)</th>
    </tr></thead>
    <tbody id="tbody"></tbody>
  </table>
</div>

<script>
let DATA=null, sortKey="soma", sortDir=-1;
const fmt=n=>n.toLocaleString('pt-BR');

async function loadData(){
  // Carga inicial rápida: usa a cópia salva (data.json).
  const r=await fetch('data.json?t='+Date.now());
  DATA=await r.json();
  initFilters();
  render();
}

// ===== Atualização AO VIVO direto da planilha (ao clicar no botão) =====
const SHEET_ID="195akgdyA1wWWeTfR4MOjRb84onEb5OmPWBW13TiTBkE";
const GID="2022201557";
const CSV_URL="https://docs.google.com/spreadsheets/d/"+SHEET_ID+"/export?format=csv&gid="+GID;
const MONTHS={"janeiro":1,"fevereiro":2,"marco":3,"março":3,"abril":4,"maio":5,
  "junho":6,"julho":7,"agosto":8,"setembro":9,"outubro":10,"novembro":11,"dezembro":12};

function parseCSV(text){
  const rows=[]; let row=[], cur="", q=false;
  for(let i=0;i<text.length;i++){
    const c=text[i];
    if(q){
      if(c==='"'){ if(text[i+1]==='"'){cur+='"';i++;} else q=false; }
      else cur+=c;
    }else{
      if(c==='"') q=true;
      else if(c===','){ row.push(cur); cur=""; }
      else if(c==='\n'){ row.push(cur); rows.push(row); row=[]; cur=""; }
      else if(c==='\r'){}
      else cur+=c;
    }
  }
  if(cur!==""||row.length){ row.push(cur); rows.push(row); }
  return rows;
}

function buildFromCSV(text){
  const rows=parseCSV(text);
  const dateRe=/^(\d{1,2})\/(\d{1,2})/;
  let curDate=null, year=new Date().getFullYear();
  const descCounts={}, left={}, right={}, order=[];
  for(const r of rows){
    const g=i=>(r[i]!=null?String(r[i]).trim():"");
    const A=g(0),B=g(1),C=g(2),D=g(3),E=g(4),G=g(6),H=g(7);
    const low=A.toLowerCase().trim();
    if(MONTHS[low]) continue;
    const m=A.match(dateRe);
    if(m){
      const dd=("0"+parseInt(m[1])).slice(-2), mm=("0"+parseInt(m[2])).slice(-2);
      curDate=dd+"/"+mm;
      if(!left[curDate]){ left[curDate]={}; right[curDate]={}; order.push([year,+mm,+dd,curDate]); }
      continue;
    }
    if(B && C && /^\d+$/.test(C) && B!=="Nome do produto"){
      const qn=E?parseInt(parseFloat(E))||0:0;
      (descCounts[C]=descCounts[C]||{})[B]=(descCounts[C][B]||0)+1;
      if(curDate){
        const d=left[curDate][C]=left[curDate][C]||{qty:0,log:{}};
        d.qty+=qn; if(D) d.log[D]=(d.log[D]||0)+qn;
      }
    }
    if(G && /^\d+$/.test(G) && H!=="" && curDate){
      const s=parseInt(parseFloat(H));
      if(!isNaN(s)) right[curDate][G]=(right[curDate][G]||0)+s;
    }
  }
  const skuDesc={};
  for(const sku in descCounts){
    skuDesc[sku]=Object.entries(descCounts[sku]).sort((a,b)=>b[1]-a[1])[0][0];
  }
  const records=[];
  for(const [yy,mm,dd,dl] of order){
    const skus=new Set([...Object.keys(right[dl]),...Object.keys(left[dl])]);
    skus.forEach(sku=>{
      let soma=right[dl][sku];
      const ldet=left[dl][sku]||{qty:0,log:{}};
      if(soma==null) soma=ldet.qty;
      const log=Object.entries(ldet.log).sort((a,b)=>b[1]-a[1]).map(([name,qty])=>({name,qty}));
      records.push({date:dl,sku,desc:skuDesc[sku]||("SKU "+sku),soma,logistics:log});
    });
  }
  return {generatedAt:new Date().toLocaleString('pt-BR'),sourceUrl:CSV_URL.replace('export?format=csv','edit?'),
    dates:order.map(o=>o[3]),skuDesc,records};
}

async function fetchLive(){
  const btn=document.getElementById('reloadBtn');
  const old=btn.textContent; btn.textContent='⏳ Buscando da planilha...'; btn.disabled=true;
  try{
    const r=await fetch(CSV_URL+'&t='+Date.now(),{cache:'no-store'});
    if(!r.ok) throw new Error('HTTP '+r.status);
    const txt=await r.text();
    DATA=buildFromCSV(txt);
    const cur=document.getElementById('dateSel').value;
    initFilters();
    const ds=document.getElementById('dateSel');
    if([...ds.options].some(o=>o.value===cur)) ds.value=cur;
    document.getElementById('srcMeta').innerHTML=
      '✅ Dados ao vivo da planilha • '+DATA.generatedAt+' • <a href="'+DATA.sourceUrl+'" target="_blank">abrir planilha</a>';
    render();
  }catch(e){
    alert('Não consegui buscar da planilha agora ('+e.message+'). Mostrando a cópia salva.');
    await loadData();
  }finally{
    btn.textContent=old; btn.disabled=false;
  }
}

function initFilters(){
  const ds=document.getElementById('dateSel');
  ds.innerHTML='<option value="__all__">Todas as datas (somadas)</option>';
  DATA.dates.forEach(d=>{const o=document.createElement('option');o.value=d;o.textContent=d;ds.appendChild(o);});
  const logs=new Set();
  DATA.records.forEach(r=>r.logistics.forEach(l=>logs.add(l.name)));
  const ls=document.getElementById('logSel');
  ls.innerHTML='<option value="__all__">Todas</option>';
  [...logs].sort().forEach(n=>{const o=document.createElement('option');o.value=n;o.textContent=n;ls.appendChild(o);});
  document.getElementById('srcMeta').innerHTML=
    'Atualizado em: '+ (DATA.generatedAt||'-') +' • <a href="'+DATA.sourceUrl+'" target="_blank">abrir planilha</a>';
}

function aggregate(){
  const q=document.getElementById('search').value.trim().toLowerCase();
  const date=document.getElementById('dateSel').value;
  const logf=document.getElementById('logSel').value;
  let recs=DATA.records;
  if(date!=='__all__') recs=recs.filter(r=>r.date===date);
  if(logf!=='__all__') recs=recs.filter(r=>r.logistics.some(l=>l.name===logf));
  if(q) recs=recs.filter(r=>r.desc.toLowerCase().includes(q)||r.sku.includes(q));

  // agrupa por SKU
  const map={};
  recs.forEach(r=>{
    let g=map[r.sku];
    if(!g){g=map[r.sku]={sku:r.sku,desc:r.desc,soma:0,dates:new Set(),log:{}};}
    // se filtrando por logística, conta só a qtd daquela logística
    if(logf!=='__all__'){
      r.logistics.forEach(l=>{if(l.name===logf){g.soma+=l.qty; g.log[l.name]=(g.log[l.name]||0)+l.qty;}});
    }else{
      g.soma+=r.soma;
      r.logistics.forEach(l=>{g.log[l.name]=(g.log[l.name]||0)+l.qty;});
    }
    g.dates.add(r.date);
  });
  return Object.values(map).map(g=>({
    sku:g.sku, desc:g.desc, soma:g.soma,
    dateInfo: g.dates.size===1?[...g.dates][0]:(g.dates.size+' datas'),
    nDates:g.dates.size,
    logistics:Object.entries(g.log).sort((a,b)=>b[1]-a[1]).map(([name,qty])=>({name,qty}))
  }));
}

function render(){
  const rows=aggregate();
  // cards
  const totQty=rows.reduce((s,r)=>s+r.soma,0);
  const date=document.getElementById('dateSel').value;
  document.getElementById('cProds').textContent=fmt(rows.length);
  document.getElementById('cQty').textContent=fmt(totQty);
  document.getElementById('cDates').textContent= date==='__all__'?DATA.dates.length:1;
  const top=[...rows].sort((a,b)=>b.soma-a.soma)[0];
  document.getElementById('cTop').textContent= top? fmt(top.soma):'–';

  // charts
  const bySoma=[...rows].sort((a,b)=>b.soma-a.soma);
  drawChart('chartTop', bySoma.slice(0,10), '#34d399');
  drawChart('chartBottom', bySoma.slice(-10).reverse(), '#f87171');

  // sort table
  rows.sort((a,b)=>{
    let x=a[sortKey],y=b[sortKey];
    if(sortKey==='soma'||sortKey==='dateInfo'){x=sortKey==='dateInfo'?a.nDates:a.soma;y=sortKey==='dateInfo'?b.nDates:b.soma;}
    if(sortKey==='sku'){x=+a.sku;y=+b.sku;}
    if(typeof x==='string'){return sortDir*x.localeCompare(y);}
    return sortDir*(x-y);
  });

  document.getElementById('count').textContent=fmt(rows.length)+' produto(s) • quantidade total '+fmt(totQty);
  const tb=document.getElementById('tbody');
  tb.innerHTML=rows.map(r=>{
    const chips=r.logistics.map(l=>`<span class="chip">${l.name} • ${fmt(l.qty)}</span>`).join('');
    return `<tr>
      <td class="sku">${r.sku}</td>
      <td>${r.desc}</td>
      <td>${chips||'<span style="color:#64748b">—</span>'}</td>
      <td>${r.dateInfo}</td>
      <td class="num soma">${fmt(r.soma)}</td>
    </tr>`;
  }).join('');
}

let chartTop, chartBottom;
function drawChart(id, data, color){
  const ctx=document.getElementById(id);
  const labels=data.map(d=>d.desc.length>28?d.desc.slice(0,28)+'…':d.desc);
  const vals=data.map(d=>d.soma);
  const cfg={
    type:'bar',
    data:{labels,datasets:[{data:vals,backgroundColor:color+'cc',borderColor:color,borderWidth:1}]},
    options:{indexAxis:'y',responsive:true,maintainAspectRatio:false,
      plugins:{legend:{display:false},tooltip:{callbacks:{
        title:(it)=>data[it[0].dataIndex].desc+' (SKU '+data[it[0].dataIndex].sku+')',
        label:(it)=>'Qtd: '+fmt(it.raw)}}},
      scales:{x:{ticks:{color:'#94a3b8'},grid:{color:'#33415555'}},
              y:{ticks:{color:'#cbd5e1',font:{size:11}},grid:{display:false}}}}
  };
  if(id==='chartTop'){chartTop&&chartTop.destroy();chartTop=new Chart(ctx,cfg);}
  else{chartBottom&&chartBottom.destroy();chartBottom=new Chart(ctx,cfg);}
}

document.getElementById('search').addEventListener('input',render);
document.getElementById('dateSel').addEventListener('change',render);
document.getElementById('logSel').addEventListener('change',render);
document.getElementById('clearBtn').addEventListener('click',()=>{
  document.getElementById('search').value='';
  document.getElementById('dateSel').value='__all__';
  document.getElementById('logSel').value='__all__';render();
});
document.getElementById('reloadBtn').addEventListener('click',fetchLive);
document.querySelectorAll('th[data-sort]').forEach(th=>th.addEventListener('click',()=>{
  const k=th.dataset.sort;
  if(sortKey===k)sortDir*=-1;else{sortKey=k;sortDir=(k==='soma'||k==='dateInfo')?-1:1;}
  render();
}));

loadData().catch(e=>{document.getElementById('count').textContent='Erro ao carregar dados: '+e;});
</script>
</body>
</html>
